<!-- EpiAwarePackageTools.jl logo. A letter-mark in the scaffolded style (the
     green rounded square + initial the kit seeds as a placeholder for every
     adopting package), using "P" for PackageTools. Package-owned: `scaffold_update`
     never regenerates it, so editing here is safe. The README title and the
     DocumenterVitepress site logo both resolve this exact path (see
     docs/make.jl's README -> index.md step), so no other wiring is needed. -->
<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150"
     viewBox="0 0 150 150" role="img" aria-label="EpiAwarePackageTools logo">
  <title>EpiAwarePackageTools logo</title>
  <rect width="150" height="150" rx="18" fill="#389826"/>
  <text x="75" y="98" font-family="sans-serif" font-size="76"
        font-weight="700" fill="#ffffff" text-anchor="middle">
    P
  </text>
</svg>

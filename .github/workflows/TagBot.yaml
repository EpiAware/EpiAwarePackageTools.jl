name: TagBot

on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      lookback:
        default: "3"

jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    uses: EpiAware/.github/.github/workflows/tagbot.yml@1b36d466be7e132c3a8a4f75d9ac90d9642c6f81
    with:
      lookback: ${{ github.event.inputs.lookback || '3' }}
    secrets: inherit  # pragma: allowlist secret

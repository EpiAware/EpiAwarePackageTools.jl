name: Code coverage

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    uses: EpiAware/.github/.github/workflows/coverage.yml@6d4e35e2515f947acbf7d2a683cbf02b341005c7
    with:
      julia_version: '1'
      # Upload coverage best-effort. A freshly-scaffolded repo has no
      # CODECOV_TOKEN yet; on a protected branch Codecov then rejects the
      # upload ('Token required because branch is protected'), and
      # fail_ci_if_error: true would red the whole coverage check even though
      # the tests passed. Add CODECOV_TOKEN (repo or org secret) and flip this
      # to true to make coverage an enforced, hard-failing check.
      fail_ci_if_error: false
    secrets: inherit  # pragma: allowlist secret

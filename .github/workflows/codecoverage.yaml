name: Code coverage

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    uses: EpiAware/.github/.github/workflows/coverage.yml@0b92629d0e7663ba8708af5b4d2f8e03d05fea2c
    with:
      julia_version: '1'
    secrets: inherit  # pragma: allowlist secret

name: Test

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: EpiAware/.github/.github/workflows/tests.yml@0b92629d0e7663ba8708af5b4d2f8e03d05fea2c
    secrets: inherit  # pragma: allowlist secret

  downgrade-compat:
    uses: EpiAware/.github/.github/workflows/downgrade.yml@0b92629d0e7663ba8708af5b4d2f8e03d05fea2c
    secrets: inherit  # pragma: allowlist secret

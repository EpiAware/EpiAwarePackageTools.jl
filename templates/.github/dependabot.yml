# Configure Dependabot version updates
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
#
# NOTE: no reviewer/assignee keys are set. GitHub cannot assign an organisation
# as a reviewer or assignee — only a username or an `org/team` — so a bare org
# makes every Dependabot PR error with "can't assign <org> as a reviewer". To
# add them, set a real username or a team in `org/team` form (e.g. a user
# "octocat", or a team "{{ORG}}/maintainers") under each update entry; never a
# bare org. See the GitHub docs linked above for the exact keys.
version: 2
updates:
  # GitHub Actions: keeps the reusable-workflow pins (and any actions) current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
      include: "scope"

  # Julia dependencies. Uses the workspace feature (Julia 1.12+) to coordinate
  # updates across the main package, test/, docs/, and benchmark/ environments.
  - package-ecosystem: "julia"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"

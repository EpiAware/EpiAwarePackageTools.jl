# MANAGED by EpiAwarePackageTools.scaffold — do not edit by hand.
name: pre-commit

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    uses: {{ORG}}/.github/.github/workflows/format-check.yml@6fcdcde033ec670ac3832b239427fd2ded591bbc
    # Pin the CI formatter to the same version as the local pre-commit hook and
    # the isolated formatter env (single source: `{{JULIAFORMATTER_VERSION}}`).
    # Without this the shared workflow installs its own default and reformats
    # code the pinned local formatter left intact, failing the check (#114).
    with:
      juliaformatter_version: '{{JULIAFORMATTER_VERSION}}'
    secrets: inherit  # pragma: allowlist secret

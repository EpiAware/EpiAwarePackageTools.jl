# MANAGED by EpiAwarePackageTools.scaffold — do not edit by hand.
name: AD

# Drives the per-backend AD gradient matrix (the shipped `test/ad/` harness).
# The backend matrix and per-flag coverage upload live in the reusable; this is
# the thin caller. Without it the AD harness the kit ships never runs in CI.

on:
  push:
    branches: [main]
    # Don't fire the 6-backend AD sweep (the heaviest, slowest matrix) for
    # changes that cannot alter a gradient result. Only clearly AD-irrelevant
    # paths are ignored: prose docs and markdown. Anything touching src/,
    # ext/, test/, Project.toml, benchmark/ or the workflow itself still
    # triggers the full matrix. paths-ignore only skips when EVERY changed
    # file matches, so a mixed docs+src PR still runs.
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ad:
    uses: {{ORG}}/.github/.github/workflows/ad.yml@dc919e0d1674c16d1518df07eda5ee0be09b47e2
    secrets: inherit  # pragma: allowlist secret
